<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>产品索引 | Agent Index</title>
    <meta name="description" content="可搜索、筛选和对比的 Agent 产品索引，详情页保留官网、定价与重大更新信源。">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23080b10'/%3E%3Cpath d='M18 22h28M18 32h20M18 42h28' stroke='%23f2aa48' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="assets/cockpit.css">
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>

    <header class="topbar">
      <a class="brand" href="index.html" aria-label="返回 Agent Index 首页">
        <span class="brand-glyph" aria-hidden="true">
          <span></span><span></span><span></span>
        </span>
        <span>
          <strong>Agent Index</strong>
          <small>Agent Market Intelligence</small>
        </span>
      </a>
      <nav class="nav-pills" aria-label="主导航">
        <a href="index.html#briefing">简报</a>
        <a href="index.html#strategy">战略判断</a>
        <a href="index.html#universe">产品宇宙</a>
        <a href="timeline.html">重大动态</a>
        <a href="products.html" aria-current="page">产品索引</a>
      </nav>
      <a class="deploy-state" href="timeline.html"><i aria-hidden="true"></i>每周一自动更新</a>
    </header>

    <main>
      <section id="products" class="section products-section">
        <div class="section-heading product-heading">
          <div>
            <p class="system-line">Product Index</p>
            <h2>产品索引与对比视图</h2>
          </div>
          <div class="view-toggle" aria-label="切换视图">
            <button type="button" class="active" data-view="cards">卡片</button>
            <button type="button" data-view="table">表格</button>
          </div>
        </div>

        <div class="command-bar">
          <label>
            <span>搜索产品、厂商或能力</span>
            <input id="product-search" type="search" placeholder="例如 OpenAI、腾讯、Skill、云端沙箱">
          </label>
          <label>
            <span>产品类型</span>
            <select id="type-filter"></select>
          </label>
          <label>
            <span>竞争分组</span>
            <select id="group-filter"></select>
          </label>
          <button type="button" id="clear-filters">清除筛选</button>
        </div>

        <div class="result-meta" id="result-meta"></div>
        <div class="product-cards" id="product-cards"></div>
        <div class="product-table-wrap hidden" id="product-table-wrap"></div>
      </section>
    </main>

    <script src="data/site-data.js"></script>
    <script src="data/major-updates.js"></script>
    <script src="data/product-visuals.js"></script>
    <script src="assets/global-galaxy.js"></script>
    <script src="assets/cockpit.js"></script>
  </body>
</html>
