name: Discover major product updates

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run discover
      - run: npm run validate
      - uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/major-update-candidates
          delete-branch: true
          commit-message: "chore: refresh major update candidates"
          title: "候选：本周重大产品动态"
          body: |
            自动发现的重大更新候选，仅供审核。

            请核对信源与实际影响。确认值得收录后，运行：
            `npm run promote -- <candidate-id>`

            发布前必须补充摘要、分类和收录原因。
          labels: intelligence-candidates
