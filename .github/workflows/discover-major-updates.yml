name: Weekly auto-review and publish

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. 02:10 UTC is Monday 10:10 in Asia/Shanghai.
    - cron: "10 2 * * 1"

permissions:
  contents: write

concurrency:
  group: weekly-auto-review-and-publish
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm run weekly:auto
      - name: Commit reviewed updates directly to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reviews
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "content: weekly automatic product intelligence update"
            git push origin HEAD:main
          fi
